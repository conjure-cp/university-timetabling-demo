version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "jest-watch-typeahead"
        update-types:
          - "version-update:semver-major"
    assignees:
      - "ozgurakgun"
    # groups:
    #   all-npm-packages:
    #     patterns:
    #       - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: monthly
    assignees:
      - ozgurakgun
    labels:
      - "dependencies"
      - "dependencies::ci"
